name: task_alert

on:
  schedule:
    - cron: '0 23 * * 0-4'  # 毎朝 8:00 JST（月〜金）= UTC 23:00（日〜木）
  workflow_dispatch: {}       # 手動実行も可能

jobs:
  alert:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 日本語・絵文字フォントをインストール
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji
          fc-cache -fv

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: Playwright ブラウザキャッシュの復元
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Playwright Chromium をインストール
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium --with-deps

      - name: Playwright 依存ライブラリをインストール（キャッシュヒット時）
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: タスクアラートを実行
        env:
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID:  ${{ secrets.SLACK_CHANNEL_ID }}
          DASHBOARD_URL:     ${{ secrets.DASHBOARD_URL }}
        run: python task_alert.py
