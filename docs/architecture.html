<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アーキテクチャ図 — GitHub Actions 構成</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f9f9f9;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN", メイリオ, Meiryo, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .card {
      max-width: 760px;
      width: 100%;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0px 2px 4px 0px rgba(0,0,0,.25);
      overflow: hidden;
    }
    header {
      background: #0c419a;
      padding: 20px 32px;
      text-align: center;
    }
    header h1 {
      color: #ffffff;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.02em;
    }
    .flow {
      background: #f9f9f9;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .node {
      background: #eef1f8;
      border: 1px solid #dfe4f0;
      border-radius: 8px;
      box-shadow: 0px 2px 4px 0px rgba(0,0,0,.25);
      width: 280px;
      padding: 14px 18px;
    }
    .node.trigger { border-left: 4px solid #0c419a; }
    .node.process  { border-left: 4px solid #3569c0; }
    .node.external { border-left: 4px solid #dfe4f0; }
    .node-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .node-emoji { font-size: 20px; line-height: 1; }
    .node-label {
      font-size: 15px;
      font-weight: bold;
      color: #101010;
      line-height: 1.3;
    }
    .node-sub {
      font-size: 12px;
      color: #303030;
      margin-top: 4px;
      padding-left: 28px;
      line-height: 1.5;
    }
    .arrow-down {
      display: flex;
      justify-content: center;
      margin: 4px 0;
    }
    .branch-arrow {
      margin: 4px 0;
    }
    .parallel {
      display: flex;
      flex-direction: row;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }
    footer {
      background: #f9f9f9;
      border-top: 1px solid #dfe4f0;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .legend {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .legend-title {
      font-size: 12px;
      font-weight: bold;
      color: #101010;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-box {
      width: 24px;
      height: 16px;
      background: #eef1f8;
      border-top: 1px solid #dfe4f0;
      border-right: 1px solid #dfe4f0;
      border-bottom: 1px solid #dfe4f0;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .legend-box.trigger { border-left: 4px solid #0c419a; }
    .legend-box.process  { border-left: 4px solid #3569c0; }
    .legend-box.external { border-left: 4px solid #dfe4f0; }
    .legend-label {
      font-size: 12px;
      color: #303030;
    }
    .updated {
      font-size: 12px;
      color: #303030;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Header -->
    <header>
      <h1>アーキテクチャ図 — GitHub Actions 構成</h1>
    </header>

    <!-- Flow Diagram -->
    <div class="flow">

      <!-- Node 1: Schedule -->
      <div class="node trigger">
        <div class="node-title">
          <span class="node-emoji">⏰</span>
          <span class="node-label">毎朝 8:00 JST（月〜金）</span>
        </div>
        <div class="node-sub">cron スケジュール実行</div>
      </div>

      <!-- Arrow -->
      <div class="arrow-down">
        <svg width="24" height="40" viewBox="0 0 24 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="12" y1="0" x2="12" y2="28" stroke="#3569c0" stroke-width="2.2" stroke-linecap="round"/>
          <polygon points="12,40 4,24 20,24" fill="#3569c0"/>
        </svg>
      </div>

      <!-- Node 2: GitHub Actions -->
      <div class="node trigger">
        <div class="node-title">
          <span class="node-emoji">🔧</span>
          <span class="node-label">GitHub Actions</span>
        </div>
        <div class="node-sub">cron: "0 23 * * 1-5"&nbsp; /&nbsp; ubuntu-latest</div>
      </div>

      <!-- Arrow -->
      <div class="arrow-down">
        <svg width="24" height="40" viewBox="0 0 24 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="12" y1="0" x2="12" y2="28" stroke="#3569c0" stroke-width="2.2" stroke-linecap="round"/>
          <polygon points="12,40 4,24 20,24" fill="#3569c0"/>
        </svg>
      </div>

      <!-- Node 3: Python Script -->
      <div class="node process">
        <div class="node-title">
          <span class="node-emoji">⚙️</span>
          <span class="node-label">task_alert.py</span>
        </div>
        <div class="node-sub">Python スクリプト実行</div>
      </div>

      <!-- Branch Arrow -->
      <div class="branch-arrow">
        <svg width="320" height="56" viewBox="0 0 320 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="160" y1="0" x2="160" y2="20" stroke="#3569c0" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="80" y1="20" x2="240" y2="20" stroke="#3569c0" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="80" y1="20" x2="80" y2="40" stroke="#3569c0" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="240" y1="20" x2="240" y2="40" stroke="#3569c0" stroke-width="2.2" stroke-linecap="round"/>
          <polygon points="80,56 72,40 88,40" fill="#3569c0"/>
          <polygon points="240,56 232,40 248,40" fill="#3569c0"/>
        </svg>
      </div>

      <!-- Parallel Nodes -->
      <div class="parallel">
        <div class="node external">
          <div class="node-title">
            <span class="node-emoji">📦</span>
            <span class="node-label">Backlog API</span>
          </div>
          <div class="node-sub">チケット取得</div>
        </div>
        <div class="node external">
          <div class="node-title">
            <span class="node-emoji">💬</span>
            <span class="node-label">Slack Webhook</span>
          </div>
          <div class="node-sub">#wincs-cs へ投稿</div>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <footer>
      <div class="legend">
        <span class="legend-title">凡例:</span>
        <div class="legend-item">
          <div class="legend-box trigger"></div>
          <span class="legend-label">トリガー</span>
        </div>
        <div class="legend-item">
          <div class="legend-box process"></div>
          <span class="legend-label">処理</span>
        </div>
        <div class="legend-item">
          <div class="legend-box external"></div>
          <span class="legend-label">外部サービス</span>
        </div>
      </div>
      <span class="updated">更新日：2026/04/29</span>
    </footer>
  </div>
</body>
</html>
